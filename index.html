<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QoL Map Waypoint Wiki</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/dark.css" />
    <style>
    .sidebar {
      background: #1f2430;
    }
    .content {
      background: #2b2f3a;
    }
    .sidebar ul li a {
      color: #e6e6e6;
    }
    .sidebar ul li.active > a {
      color: #42b983;
      font-weight: 700;
    }
    .markdown-section {
      color: #f0f0f0;
    }
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 {
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'QoL Map Waypoint',
      repo: 'https://github.com/yinyin333333/QoL-Map-Waypoint-Wiki',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      alias: {
        '/ko/_sidebar.md': '/ko/_sidebar.md',
        '/_sidebar.md': '/_sidebar.md'
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
